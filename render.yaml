services:
  - type: web
    name: warden
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@warden.local
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATA_DIR
        value: /app/data
    # NOTE: Render's free plan can't attach a persistent disk — your SQLite
    # database resets on every restart/redeploy on this plan. Fine for a demo.
    # To make data persist, upgrade to a paid plan and uncomment below:
    #
    # plan: starter
    # disk:
    #   name: warden-data
    #   mountPath: /app/data
    #   sizeGB: 1