services:
  - type: web
    name: warden
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@warden.local
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATA_DIR
        value: /app/data
    disk:
      name: warden-data
      mountPath: /app/data
      sizeGB: 1
